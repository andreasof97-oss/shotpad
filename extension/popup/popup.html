<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShotPad</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="header-left">
        <span class="logo-icon">📸</span>
        <span class="logo-text">ShotPad</span>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="btn-settings" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>
    </header>

    <!-- Capture Buttons -->
    <main class="popup-main">
      <button class="capture-btn" id="btn-visible">
        <div class="capture-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
            <line x1="8" y1="21" x2="16" y2="21"></line>
            <line x1="12" y1="17" x2="12" y2="21"></line>
          </svg>
        </div>
        <div class="capture-text">
          <span class="capture-title">Visible Area</span>
          <span class="capture-desc">Screenshot what you see</span>
        </div>
        <span class="capture-shortcut">Ctrl+Shift+X</span>
      </button>

      <button class="capture-btn" id="btn-region">
        <div class="capture-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke-dasharray="4 2"></rect>
            <line x1="3" y1="9" x2="21" y2="9" opacity="0"></line>
            <path d="M9 3v18M15 3v18" opacity="0.3" stroke-dasharray="2 2"></path>
            <path d="M3 9h18M3 15h18" opacity="0.3" stroke-dasharray="2 2"></path>
          </svg>
        </div>
        <div class="capture-text">
          <span class="capture-title">Select Region</span>
          <span class="capture-desc">Click & drag to capture</span>
        </div>
      </button>

      <button class="capture-btn" id="btn-fullpage">
        <div class="capture-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="12" y1="18" x2="12" y2="12"></line>
            <polyline points="9 15 12 12 15 15"></polyline>
          </svg>
        </div>
        <div class="capture-text">
          <span class="capture-title">Full Page</span>
          <span class="capture-desc">Capture entire page</span>
        </div>
      </button>
    </main>

    <!-- Footer -->
    <footer class="popup-footer">
      <span class="footer-text" id="capture-count">No captures today</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
